[advisories]
ignore = [
    "RUSTSEC-2026-0009",
    # tao transitive deps — GTK3 bindings (unmaintained, only used on Linux; we use Cocoa on macOS)
    "RUSTSEC-2024-0370", # proc-macro-error
    "RUSTSEC-2024-0384", # instant
    "RUSTSEC-2024-0411", # gtk-rs atk
    "RUSTSEC-2024-0412", # gtk-rs atk-sys
    "RUSTSEC-2024-0413", # gtk-rs cairo-rs
    "RUSTSEC-2024-0414", # gtk-rs cairo-sys-rs
    "RUSTSEC-2024-0415", # gtk-rs gdk
    "RUSTSEC-2024-0416", # gtk-rs gdk-pixbuf
    "RUSTSEC-2024-0418", # gtk-rs gio
    "RUSTSEC-2024-0419", # gtk-rs glib
    "RUSTSEC-2024-0420", # gtk-rs gtk
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
